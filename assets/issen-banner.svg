<?xml version="1.0" encoding="UTF-8"?>
<!-- Transparent background — designed to render on dark surfaces -->
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 2560 640" width="2560" height="640">

  <!-- Icon (light palette, transparent bg) -->
  <image href="issen-icon-light.svg" x="64" y="64" width="512" height="512"
         preserveAspectRatio="xMidYMid meet"/>

  <!-- Vertical rule -->
  <line x1="630" y1="80" x2="630" y2="560"
        stroke="#505070" stroke-width="2"/>

  <!-- "Issen" wordmark — white -->
  <text x="690" y="286"
        font-family="Helvetica Neue, Helvetica, Arial, Liberation Sans, sans-serif"
        font-size="192" font-weight="700" letter-spacing="-4"
        fill="#FFFFFF">Issen</text>

  <!-- Tagline — light gray -->
  <text x="695" y="390"
        font-family="Helvetica Neue, Helvetica, Arial, Liberation Sans, sans-serif"
        font-size="60" font-weight="400"
        fill="#C8C8D8">One command. One output. The full attack narrative.</text>

  <!-- Sub-tagline — mid gray -->
  <text x="697" y="470"
        font-family="Helvetica Neue, Helvetica, Arial, Liberation Sans, sans-serif"
        font-size="48" font-weight="400"
        fill="#9d9da3">Fast forensic triage for incident responders.</text>

</svg>
