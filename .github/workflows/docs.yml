name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy cargo doc
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # actions/checkout blocks paths outside GITHUB_WORKSPACE, so clone
      # sibling repos directly to the parent directory where Cargo expects them.
      - name: Clone sibling repos
        run: |
          cd /home/runner/work/issen
          git clone --depth 1 https://github.com/SecurityRonin/forensicnomicon.git forensicnomicon
          git clone --depth 1 https://github.com/SecurityRonin/winevt-forensic.git winevt-forensic
          git clone --depth 1 https://github.com/SecurityRonin/memory-forensic.git memory-forensic
          git clone --depth 1 https://github.com/SecurityRonin/browser-forensic.git browser-forensic
          git clone --depth 1 https://github.com/SecurityRonin/srum-forensic.git srum-forensic
          git clone --depth 1 https://github.com/SecurityRonin/usnjrnl-forensic.git usnjrnl-forensic

      - name: Install system dependencies
        run: sudo apt-get install -y protobuf-compiler

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: Swatinem/rust-cache@9bdad043e88c75890e36ad3bbc8d27f0090dd609 # v2

      - name: Build workspace docs
        run: |
          cargo doc \
            --workspace \
            --no-deps \
            --document-private-items \
            --features remote
        env:
          RUSTDOCFLAGS: "--enable-index-page -Zunstable-options --default-theme ayu"

      - name: Add redirect index and copy markdown docs
        run: |
          # Root redirect → issen_cli crate docs
          cat > target/doc/index.html <<'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>Issen — Docs</title>
            <meta http-equiv="refresh" content="0; url=issen_cli/index.html">
          </head>
          <body>
            <p>Redirecting to <a href="issen_cli/index.html">issen_cli</a>&hellip;</p>
          </body>
          </html>
          EOF
          # Copy markdown docs so they're accessible under /docs/
          mkdir -p target/doc/docs
          cp -r docs/*.md target/doc/docs/ 2>/dev/null || true
          cp README.md target/doc/docs/README.md 2>/dev/null || true
          # Copy standalone HTML pages to site root
          cp docs/architecture-diagram.html target/doc/architecture-diagram.html

      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ./target/doc

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
