name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  # Drop debug symbols to shrink build artifacts — the bundled DuckDB C++
  # amalgamation (libduckdb-sys) otherwise fills the ubuntu runner's disk
  # ("No space left on device"). Does not affect debug-assertions or behavior.
  CARGO_PROFILE_DEV_DEBUG: "0"
  CARGO_PROFILE_TEST_DEBUG: "0"

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          # Pinned to match rust-toolchain.toml (single source of truth). Bump
          # both together in the fleet-wide pass; floating `stable` reintroduces
          # fmt/clippy drift the pin exists to prevent.
          toolchain: "1.96.0"
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      # Reclaim ~30 GB so the bundled-DuckDB C++ build (via --bins) fits on disk.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
      # `--bins` compiles issen-cli, whose etcd-client build dep needs `protoc`.
      - uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3.0.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          # Pinned to match rust-toolchain.toml (single source of truth). Bump
          # both together in the fleet-wide pass; floating `stable` reintroduces
          # fmt/clippy drift the pin exists to prevent.
          toolchain: "1.96.0"
          components: clippy
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - run: cargo clippy --workspace --lib --bins -- -D warnings

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      # Reclaim ~30 GB on the Linux runner so the bundled-DuckDB C++ build fits.
      - name: Free disk space
        if: runner.os == 'Linux'
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
      # etcd-client's build script compiles .proto files and needs `protoc` on
      # PATH (absent on the macOS runner); install it cross-platform.
      - uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3.0.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          # Pinned to match rust-toolchain.toml (single source of truth). Bump
          # both together in the fleet-wide pass; floating `stable` reintroduces
          # fmt/clippy drift the pin exists to prevent.
          toolchain: "1.96.0"
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - run: cargo test --workspace

  deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      # Run cargo-deny on the host (not the action's container) so the pinned
      # rust-toolchain.toml (1.96.0) resolves; the action's container ships only
      # `stable` and errors "override toolchain '1.96.0' is not installed".
      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: "1.96.0"
      - run: cargo install cargo-deny --locked
      - run: cargo deny check

  audit:
    name: Cargo Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      # Same toolchain-resolution reason as Cargo Deny; also the prior
      # rustsec/audit-check pinned SHA no longer resolves. Ignored advisories
      # are listed in audit.toml (mirrors deny.toml's advisory ignores).
      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: "1.96.0"
      - run: cargo install cargo-audit --locked
      - run: cargo audit
