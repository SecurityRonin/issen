Name: WireGuard
Category: VPN
Description: |
    WireGuard is a modern, high-performance VPN tunnel that uses
    state-of-the-art cryptography. It operates as a kernel module
    or userspace implementation.
Details:
    Website: https://www.wireguard.com
    SupportedOS:
        - Windows
        - macOS
        - Linux
    InstallationPaths:
        - C:\Program Files\WireGuard\*
Artifacts:
    Disk:
        - File: '%ProgramFiles%\WireGuard\wireguard.exe'
          Description: WireGuard GUI client
          OS: Windows
        - File: '%ProgramFiles%\WireGuard\wg.exe'
          Description: WireGuard CLI tool
          OS: Windows
    Registry:
        - Path: HKLM\SYSTEM\CurrentControlSet\Services\WireGuardTunnel$*
          Description: WireGuard tunnel service registration
    Network:
        - Description: WireGuard UDP tunnel traffic
          Domains: []
          Ports:
              - 51820
