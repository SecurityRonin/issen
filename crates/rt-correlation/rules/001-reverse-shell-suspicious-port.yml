id: correlation.reverse-shell
title: Reverse shell over suspicious port
severity: high
description: Correlates a reverse-shell command with suspicious network activity on the same subject.
summary_template: "Reverse shell command correlated with suspicious outbound connection"
explanation_template: "A reverse shell invocation was observed alongside a network connection to an unusual port. This pattern is consistent with an attacker gaining interactive access to the host."
default_confidence: 78
assertion_level: correlated
within_seconds: 300
references:
  - https://redcanary.com/threat-detection-report/trends/linux-coinminers/
  - https://car.mitre.org/
clauses:
  - source: artifact
    required_tag: reverse_shell
  - source: zeek
    required_tag: suspicious_port
