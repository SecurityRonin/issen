id: artifact.persistence.multivector
title: Multi-vector persistence
severity: critical
description: >
  Run keys, scheduled tasks, and WMI event subscriptions present simultaneously
  indicate a deliberate multi-vector persistence strategy. Sophisticated threat
  actors establish redundant persistence mechanisms to survive remediation of any
  single vector. Any two of these three is sufficient to warrant escalation.
artifact_ids:
  - run_key_hklm
  - scheduled_tasks_dir
  - wmi_subscriptions
requirement:
  kind: at_least_n
  n: 2
mitre_techniques:
  - T1547.001
  - T1053.005
  - T1546.003
absence_note: >
  WMI subscriptions are a higher-sophistication indicator; presence without run
  keys may indicate the attacker intentionally avoided the more-monitored registry
  autorun locations. Scheduled task XML files under C:\Windows\System32\Tasks
  survive run key deletion — always collect both.
references:
  - https://attack.mitre.org/techniques/T1547/001/
  - https://attack.mitre.org/techniques/T1053/005/
  - https://attack.mitre.org/techniques/T1546/003/
  - https://www.fireeye.com/blog/threat-research/2019/03/silenttrinity-post-exploitation-agent.html
