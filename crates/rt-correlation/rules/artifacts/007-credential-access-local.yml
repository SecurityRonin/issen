id: artifact.credential-access.local-accounts
title: Local credential access — SAM and Security event correlation
severity: critical
description: >
  The SAM registry hive (local account password hashes) combined with Security
  event log entries (4661: SAM object access, 4656: handle request to SAM) indicate
  local credential harvesting. This combination is left by tools that dump the SAM
  database including secretsdump.py, CrackMapExec, and Mimikatz (lsadump::sam).
artifact_ids:
  - sam_users
  - evtx_security
requirement:
  kind: all
mitre_techniques:
  - T1003.002
  - T1078.003
absence_note: >
  SAM hive access over Volume Shadow Copy (vssadmin / wmic shadowcopy) does not
  require SYSTEM-level handle acquisition and may produce fewer event log entries.
  If evtx_security gaps are present alongside this finding, log clearing may have
  preceded or followed the credential access.
references:
  - https://attack.mitre.org/techniques/T1003/002/
  - https://www.ultimatewindowssecurity.com/securitylog/encyclopedia/event.aspx?eventID=4661
  - https://www.praetorian.com/blog/how-attackers-dump-active-directory-database/
