id: artifact.persistence.wmi
title: WMI persistence — subscription and MOF artifacts
severity: high
description: >
  WMI event subscriptions combined with MOF (Managed Object Format) files in the
  WMI repository directory indicate WMI-based persistence. Attackers compile MOF
  files to register __EventFilter, __EventConsumer, and __FilterToConsumerBinding
  objects that survive reboots and execute arbitrary commands on trigger conditions.
artifact_ids:
  - wmi_subscriptions
  - wmi_mof_dir
requirement:
  kind: all
mitre_techniques:
  - T1546.003
absence_note: >
  MOF directory absent on modern Windows (10/11) where WMI persistence is
  established via PowerShell (Set-WMIInstance) rather than compiled MOF files.
  The subscription objects persist in the WMI repository (OBJECTS.DATA) regardless.
  Collect evtx_wmi_activity (Microsoft-Windows-WMI-Activity/Operational) for
  subscription creation events (5861).
references:
  - https://attack.mitre.org/techniques/T1546/003/
  - https://www.fireeye.com/blog/threat-research/2017/11/wmi-arbitrary-code-execution.html
  - https://github.com/mandiant/flare-wmi
